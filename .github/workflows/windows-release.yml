name: CI and Windows Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      artifact_name:
        description: Artifact name suffix for manual builds
        required: false
        default: manual

permissions:
  contents: write

jobs:
  ci:
    name: Python CI
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: |
          python -m py_compile main.py gui.py
          python -m compileall app

  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build single-file Windows app with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name Wallpaper-Unpacker-GUI --add-data "icons.json;." main.py

      - name: Package portable release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $suffix = "${{ github.event.inputs.artifact_name }}"
            $zip = "Wallpaper-Unpacker-GUI-$suffix-windows-single-exe.zip"
          } else {
            $tag = "${{ github.ref_name }}"
            $zip = "Wallpaper-Unpacker-GUI-$tag-windows-single-exe.zip"
          }
          Compress-Archive -Path dist\Wallpaper-Unpacker-GUI.exe -DestinationPath $zip -Force
          "ZIP_NAME=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-single-exe
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "Wallpaper-Unpacker-GUI $tag" --generate-notes
          }
          gh release upload $tag $env:ZIP_NAME --clobber
