name: Build Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --windowed --name Wallpaper-Unpacker-GUI --add-data "icons.json;." main.py

      - name: Copy release files
        shell: pwsh
        run: |
          Copy-Item README_zh.md dist\Wallpaper-Unpacker-GUI\
          Copy-Item LICENSE dist\Wallpaper-Unpacker-GUI\

      - name: Create zip package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "Wallpaper-Unpacker-GUI-$tag-windows.zip"
          Compress-Archive -Path dist\Wallpaper-Unpacker-GUI\* -DestinationPath $zip -Force
          "ZIP_NAME=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release create $tag $env:ZIP_NAME --title "Wallpaper-Unpacker-GUI $tag" --notes "Windows 版本自动构建发布包。"
